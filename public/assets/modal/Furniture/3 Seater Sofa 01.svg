<?xml version="1.0" encoding="UTF-8"?>
<!-- 3 Seater Sofa 01 - Top-down plan view, AutoCAD-matched style -->
<svg width="2104mm" height="690mm" viewBox="0 0 2104 690" version="1.1" xmlns="http://www.w3.org/2000/svg"
     style="stroke-linecap:round;stroke-linejoin:round;">

    <!-- FILLABLE BODY -->
    <path id="auto-fill" d="
        M 180,0
        L 1924,0
        Q 2104,0 2104,180
        L 2104,550
        Q 2104,610 2069,648
        L 2000,690
        L 1910,690
        L 1910,570
        Q 1910,530 1882,512
        Q 1854,495 1814,495
        L 290,495
        Q 250,495 222,512
        Q 194,530 194,570
        L 194,690
        L 104,690
        L 35,648
        Q 0,610 0,550
        L 0,180
        Q 0,0 180,0
        Z
    " style="stroke-width:6;"/>

    <!-- Back inner edge -->
    <path fill="none" d="
        M 145,182
        L 145,478
        Q 145,506 173,520
        Q 201,534 240,534
        L 1864,534
        Q 1903,534 1931,520
        Q 1959,506 1959,478
        L 1959,182
    " style="stroke-width:5;"/>

    <!-- Back cushion thickness -->
    <path fill="none" d="
        M 145,182 Q 156,155 185,146 L 1919,146 Q 1948,155 1959,182
    " style="stroke-width:4;"/>

    <!-- Back-to-seat divider -->
    <line fill="none" x1="145" y1="252" x2="1959" y2="252" style="stroke-width:4;"/>

    <!-- Left seat divider (1/3) -->
    <line fill="none" x1="718" y1="182" x2="718" y2="534" style="stroke-width:5;"/>

    <!-- Right seat divider (2/3) -->
    <line fill="none" x1="1386" y1="182" x2="1386" y2="534" style="stroke-width:5;"/>

    <!-- Front edge curves at corners -->
    <path fill="none" d="M 194,534 Q 194,585 222,620 Q 250,655 290,672 L 715,672" style="stroke-width:4;"/>
    <path fill="none" d="M 1910,534 Q 1910,585 1882,620 Q 1854,655 1814,672 L 1389,672" style="stroke-width:4;"/>
    <line fill="none" x1="716" y1="672" x2="1388" y2="672" style="stroke-width:4;"/>

    <!-- Left seat cushion (closed loop showing cushion boundary) -->
    <path fill="none" d="
        M 155,252 Q 155,400 175,460 Q 200,510 240,534
        M 718,252 Q 718,400 698,460 Q 673,510 633,534
    " style="stroke-width:3;"/>

    <!-- Centre seat cushion sides -->
    <path fill="none" d="
        M 718,252 Q 718,400 738,460 Q 763,510 803,534
        M 1386,252 Q 1386,400 1366,460 Q 1341,510 1301,534
    " style="stroke-width:3;"/>

    <!-- Right seat cushion sides -->
    <path fill="none" d="
        M 1386,252 Q 1386,400 1406,460 Q 1431,510 1471,534
        M 1959,252 Q 1959,400 1939,460 Q 1914,510 1874,534
    " style="stroke-width:3;"/>

    <!-- Corner legs -->
    <rect fill="none" x="98" y="618" width="96" height="68" rx="16" style="stroke-width:4;"/>
    <rect fill="none" x="1910" y="618" width="96" height="68" rx="16" style="stroke-width:4;"/>
</svg>
